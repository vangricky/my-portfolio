<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>
      Ricky Vang | Web Developer, AI Engineer & Information Technologist
    </title>
    <meta
      name="description"
      content="Ricky Vang is a web developer, AI engineer, and information technologist specializing in React, Node.js, and generative AI. View projects, resume, and get in touch."
    />

      name="keywords"
      content="Ricky Vang, web developer, AI engineer, information technologist, React developer, full stack developer, portfolio, software engineer, LLM, generative AI, Sacramento, BYU-Idaho"
    />
    <meta name="author" content="Ricky Vang" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />

      property="og:title"
      content="Ricky Vang | Web Developer, AI Engineer & Information Technologist"

      property="og:description"

    <meta property="og:site_name" content="Ricky Vang Portfolio" />
    <meta property="og:locale" content="en_US" />

      name="twitter:title"
      content="Ricky Vang | Web Developer, AI Engineer & Information Technologist"
